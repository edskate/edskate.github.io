<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>label</title>
</head>

<body>


    <label for="User">Click me</label>
    <input type="text" id="User" name="name" />
    <p>Um elemento **HTML <label> **representa uma legenda para um item em uma interface de usuário. <br> Ele pode estar
            associado com um elemento de controle, colocando este dentro do elemento label, ou usando o atributo for. <br>
            Tal controle é chamado o controle etiquetado do elemento etiqueta. <br> Um input pode ser associado a diversas
            etiquetas (<label>s).</p>
</body>

</html>
